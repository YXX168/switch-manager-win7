name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.20.14
          cache: true
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Build 64-bit
        run: go build -trimpath -ldflags "-s -w" -o dist/switch-manager-windows-amd64.exe .
      - name: Build 32-bit
        run: $env:GOARCH="386"; go build -trimpath -ldflags "-s -w" -o dist/switch-manager-windows-386.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: switch-manager-windows
          path: dist/*.exe
